<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Mondrian</title>
  </head>
  <body>
    <h1>Composición estilo Mondrian</h1>

    <div class="canvas">
      <div class="up">
        <div class="box red up_left"></div>
        <div class="up_right">
          <div class="box yellow"></div>
          <div class="up_right_down">
            <div class="box white_up left"></div>
            <div class="box white_up"></div>
          </div>
        </div>
      </div>

      <div class="down">
        <div class="down_left">
          <div class="box black"></div>
          <div class="down_left_right">
            <div class="box white_down down_up"></div>
            <div class="box white_down"></div>
          </div>
        </div>
        <div class="down_right">
          <div class="box down_right_top"></div>
          <div class="box blue down_right_down"></div>
        </div>
      </div>
    </div>
  </body>
</html>
